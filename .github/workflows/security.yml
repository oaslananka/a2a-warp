name: Security

'on':
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

env:
  NODE_VERSION: '24.16.0'
  GITLEAKS_VERSION: '8.30.1'
  ACTIONLINT_VERSION: '1.7.12'
  OSV_SCANNER_VERSION: 'v2.3.8'
  ZIZMOR_VERSION: '1.25.2'
  GO_VERSION: '1.26.2'

jobs:
  gitleaks:
    name: Security / gitleaks
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install gitleaks
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "v${GITLEAKS_VERSION}" --repo gitleaks/gitleaks --pattern "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" --output gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
      - run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose

  audit:
    name: Security / audit
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: pnpm audit --audit-level high

  osv:
    name: Security / osv
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - run: go install "github.com/google/osv-scanner/v2/cmd/osv-scanner@${OSV_SCANNER_VERSION}"
      - run: osv-scanner scan source --lockfile=pnpm-lock.yaml .

  zizmor:
    name: Security / zizmor
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - run: python -m pip install --user pipx
      - run: python -m pipx run "zizmor==${ZIZMOR_VERSION}" .github/workflows/ --min-severity medium

  actionlint:
    name: Security / actionlint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Install actionlint
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "v${ACTIONLINT_VERSION}" --repo rhysd/actionlint --pattern "actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" --output actionlint.tar.gz
          tar -xzf actionlint.tar.gz actionlint
          sudo install -m 0755 actionlint /usr/local/bin/actionlint
      - run: actionlint .github/workflows/*.yml

  dependency-license:
    name: Security / dependency-license
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: pnpm licenses list --prod
