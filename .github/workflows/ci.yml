name: CI

'on':
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_VERSION: '24.16.0'

jobs:
  # ── Change classification ─────────────────────────────────────────────────
  changes:
    name: CI / changes
    if: github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      identity: ${{ steps.filter.outputs.identity }}
      toolchain: ${{ steps.filter.outputs.toolchain }}
      production: ${{ steps.filter.outputs.production }}
      provider-sdk: ${{ steps.filter.outputs.provider-sdk }}
      test-tooling: ${{ steps.filter.outputs.test-tooling }}
      docs: ${{ steps.filter.outputs.docs }}
      registry-ui: ${{ steps.filter.outputs.registry-ui }}
      github-actions: ${{ steps.filter.outputs.github-actions }}
      docker: ${{ steps.filter.outputs.docker }}
      release: ${{ steps.filter.outputs.release }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          filters: |
            identity:
              - 'scripts/check-package-names.mjs'
              - 'scripts/check-identity.mjs'
              - 'scripts/check-forbidden-refs.mjs'
              - 'scripts/check-no-secrets.mjs'
              - 'scripts/check-runtime-versions.mjs'
              - 'scripts/sync-deps.mjs'
              - 'tools/runtime-versions.json'
              - '.github/rulesets/**'
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'cli/package.json'
              - 'cli/src/generated/**'
            toolchain:
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'tools/runtime-versions.json'
              - '.node-version'
              - '.nvmrc'
              - '.github/actions/setup-pnpm/**'
              - 'scripts/sync-deps.mjs'
              - 'scripts/check-runtime-versions.mjs'
              - 'scripts/build-tsc-package.mjs'
              - 'cli/src/generated/**'
            production:
              - 'packages/**'
              - 'cli/src/**'
              - 'pnpm-lock.yaml'
              - 'tsconfig*.json'
            provider-sdk:
              - 'packages/adapter-*/**'
              - 'packages/adapters/**'
              - 'apps/demo/**'
            test-tooling:
              - 'vitest.config.ts'
              - 'vitest.workspace.ts'
              - 'stryker.config.json'
              - 'tsconfig.test.json'
            docs:
              - 'docs/**'
              - 'docs-site/**'
              - 'README.md'
              - 'CONTRIBUTING.md'
              - 'scripts/check-docs-*.mjs'
              - 'scripts/check-compatibility-docs.mjs'
            registry-ui:
              - 'apps/registry-ui/**'
            github-actions:
              - '.github/workflows/**'
              - '.github/actions/**'
            docker:
              - '**/Dockerfile*'
              - 'docker-compose*'
            release:
              - 'release-please-config.json'
              - '.release-please-manifest.json'
              - 'scripts/check-release-config.mjs'
              - 'scripts/validate-release-config.mjs'
              - 'scripts/prepare-release-artifacts.mjs'
              - 'scripts/release-state.mjs'

  identity:
    name: CI / identity
    if: github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          install: 'false'
          cache: 'false'
      - run: pnpm run lint:identity

  install:
    name: CI / install
    if: github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}

  # ── Quick checks (always run) ──────────────────────────────────────────────
  lint:
    name: CI / lint
    if: github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: pnpm run lint

  # ── Build and typecheck ────────────────────────────────────────────────────
  typecheck:
    name: CI / typecheck
    if: |
      (github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops') &&
      (github.event_name != 'pull_request' ||
       needs.changes.outputs.production == 'true' ||
       needs.changes.outputs.toolchain == 'true' ||
       needs.changes.outputs.test-tooling == 'true' ||
       needs.changes.outputs.registry-ui == 'true' ||
       needs.changes.outputs.github-actions == 'true')
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: pnpm run build
      - run: pnpm run typecheck

  # ── Tests ──────────────────────────────────────────────────────────────────
  unit:
    name: CI / unit
    if: |
      (github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops') &&
      (github.event_name != 'pull_request' ||
       needs.changes.outputs.production == 'true' ||
       needs.changes.outputs.provider-sdk == 'true' ||
       needs.changes.outputs.toolchain == 'true' ||
       needs.changes.outputs.test-tooling == 'true')
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: pnpm run test:coverage

  integration:
    name: CI / integration
    if: |
      (github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops') &&
      (github.event_name != 'pull_request' ||
       needs.changes.outputs.production == 'true' ||
       needs.changes.outputs.provider-sdk == 'true' ||
       needs.changes.outputs.toolchain == 'true' ||
       needs.changes.outputs.test-tooling == 'true')
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: pnpm run test:integration

  conformance:
    name: CI / conformance
    if: |
      (github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops') &&
      (github.event_name != 'pull_request' ||
       needs.changes.outputs.production == 'true' ||
       needs.changes.outputs.provider-sdk == 'true')
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: pnpm run test:conformance

  # ── Performance smoke ──────────────────────────────────────────────────────
  performance-smoke:
    name: CI / performance-smoke
    if: |
      (github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops') &&
      (github.event_name != 'pull_request' ||
       needs.changes.outputs.production == 'true' ||
       needs.changes.outputs.docker == 'true')
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: grafana/setup-k6-action@db07bd9765aac508ef18982e52ab937fe633a065 # v1.2.1
        with:
          k6-version: '2.0.0'
      - run: pnpm run perf:smoke

  # ── Schema checks ──────────────────────────────────────────────────────────
  schemas:
    name: CI / schemas
    if: |
      (github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops') &&
      (github.event_name != 'pull_request' ||
       needs.changes.outputs.production == 'true' ||
       needs.changes.outputs.toolchain == 'true')
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: pnpm run schemas:check

  # ── Mutation ───────────────────────────────────────────────────────────────
  mutation:
    name: CI / mutation
    if: |
      (github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops') &&
      (github.event_name != 'pull_request' ||
       needs.changes.outputs.production == 'true')
    needs: [changes, identity]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: pnpm run build
      - run: pnpm run test:mutation

  # ── UI E2E ─────────────────────────────────────────────────────────────────
  ui-e2e:
    name: CI / ui-e2e
    if: |
      (github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops') &&
      (github.event_name != 'pull_request' ||
       needs.changes.outputs.registry-ui == 'true' ||
       needs.changes.outputs.production == 'true' ||
       needs.changes.outputs.toolchain == 'true')
    needs: [changes, identity]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: pnpm run build
      - run: pnpm run ui:install:browsers
      - run: pnpm run ui:test:e2e
      - run: pnpm run ui:test:a11y
      - name: Upload Playwright traces
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: playwright-traces
          path: apps/registry-ui/test-results/**/trace.zip
          if-no-files-found: ignore
          retention-days: 7

  # ── Build and package ──────────────────────────────────────────────────────
  build:
    name: CI / build
    if: |
      (github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops') &&
      (github.event_name != 'pull_request' ||
       needs.changes.outputs.production == 'true' ||
       needs.changes.outputs.toolchain == 'true' ||
       needs.changes.outputs.registry-ui == 'true')
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: pnpm run build

  package-dry-run:
    name: CI / package-dry-run
    if: |
      (github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops') &&
      (github.event_name != 'pull_request' ||
       needs.changes.outputs.production == 'true' ||
       needs.changes.outputs.toolchain == 'true')
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: pnpm run build
      - run: pnpm run pack:dry-run

  workspace-graph:
    name: CI / workspace-graph
    if: |
      (github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops') &&
      (github.event_name != 'pull_request' ||
       needs.changes.outputs.production == 'true' ||
       needs.changes.outputs.toolchain == 'true')
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          install: 'false'
          cache: 'false'
      - run: node scripts/check-workspace-graph.mjs

  public-surface:
    name: CI / public-surface
    if: |
      (github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops') &&
      (github.event_name != 'pull_request' ||
       needs.changes.outputs.production == 'true')
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          install: 'false'
          cache: 'false'
      - run: node scripts/check-public-surface.mjs

  command-surface:
    name: CI / command-surface
    if: |
      (github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops') &&
      (github.event_name != 'pull_request' ||
       needs.changes.outputs.production == 'true' ||
       needs.changes.outputs.toolchain == 'true')
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          install: 'false'
          cache: 'false'
      - run: node scripts/check-command-surface.mjs

  no-generated-artifacts:
    name: CI / no-generated-artifacts
    if: |
      (github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops') &&
      (github.event_name != 'pull_request' ||
       needs.changes.outputs.production == 'true' ||
       needs.changes.outputs.toolchain == 'true')
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          install: 'false'
          cache: 'false'
      - run: node scripts/check-no-generated-artifacts.mjs

  compatibility-smoke:
    name: CI / compatibility-smoke (${{ matrix.os }}, node ${{ matrix.node }})
    if: |
      (github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops') &&
      (github.event_name != 'pull_request' ||
       needs.changes.outputs.identity == 'true' ||
       needs.changes.outputs.production == 'true' ||
       needs.changes.outputs.toolchain == 'true')
    needs: [changes]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runner: ubuntu-latest
            node: '22.22.3'
          - os: windows-latest
            runner: windows-latest
            node: '24.16.0'
          - os: macos-latest
            runner: macos-latest
            node: '24.16.0'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ matrix.node }}
      - run: pnpm run lint:identity

  consumer-smoke:
    name: CI / consumer-smoke (${{ matrix.os }}, node ${{ matrix.node }})
    if: |
      (github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops') &&
      (github.event_name != 'pull_request' ||
       needs.changes.outputs.production == 'true' ||
       needs.changes.outputs.toolchain == 'true')
    needs: [changes, identity]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runner: ubuntu-latest
            node: '22.22.3'
          - os: ubuntu-latest
            runner: ubuntu-latest
            node: '24.16.0'
          - os: windows-latest
            runner: windows-latest
            node: '24.16.0'
          - os: macos-latest
            runner: macos-latest
            node: '24.16.0'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ matrix.node }}
      - run: node scripts/run-consumer-smoke.mjs

  # ── Required checks aggregator ────────────────────────────────────────────
  # Provides a stable, documented required check that depends on all meaningful
  # CI jobs. Skipped jobs (due to path filtering) count as success. Cancelled
  # or failed jobs make this job fail.
  required:
    name: CI / required
    if: always()
    needs:
      - identity
      - install
      - lint
      - typecheck
      - unit
      - integration
      - conformance
      - schemas
      - mutation
      - ui-e2e
      - build
      - package-dry-run
      - workspace-graph
      - public-surface
      - command-surface
      - no-generated-artifacts
      - compatibility-smoke
      - consumer-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check all required jobs passed
        env:
          RESULTS: ${{ toJSON(needs.*.result) }}
        run: |
          echo "Job results: $RESULTS"
          cancelled=$(echo "$RESULTS" | grep -c '"cancelled"' || true)
          failures=$(echo "$RESULTS" | grep -c '"failure"' || true)
          if [ "$cancelled" -gt 0 ] || [ "$failures" -gt 0 ]; then
            echo "One or more required jobs failed or were cancelled."
            exit 1
          fi
          echo "All required jobs passed or were skipped."
