name: Scorecard

'on':
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '33 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scorecard:
    name: Scorecard / scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    permissions:
      contents: read
      issues: read
      pull-requests: read
      checks: read

    env:
      SCORECARD_VERSION: v5.5.0

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.3'
          cache: false

      - name: Install scorecard
        run: go install "github.com/ossf/scorecard/v5@${SCORECARD_VERSION}"

      - name: Run scorecard
        env:
          GITHUB_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scorecard --repo=github.com/${{ github.repository }} --format=json
