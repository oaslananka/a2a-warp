name: Publish

'on':
  release:
    types: [published]
  push:
    tags:
      - '@oaslananka/a2a-warp-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g., @oaslananka/a2a-warp-v1.25.0)'
        required: true
      confirm_publish:
        description: Type A2A-WARP-PUBLISH to publish
        required: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'release' && github.event.release.tag_name || github.event_name == 'push' && github.ref_name || inputs.tag }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  NODE_VERSION: '24.16.0'
  NPM_VERSION: '11.15.0'

jobs:
  publish:
    name: Publish / npm
    if: >-
      ${{
        github.repository == 'oaslananka/a2a-warp' && (
          github.event_name == 'release' ||
          github.event_name == 'push' ||
          inputs.confirm_publish == 'A2A-WARP-PUBLISH'
        )
      }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: npm-publish
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      # ── Resolve the tag from whichever event triggered ──
      - name: Resolve release tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          case "${EVENT_NAME}" in
            release)
              TAG="${RELEASE_TAG}"
              ;;
            push)
              TAG="${REF_NAME}"
              ;;
            workflow_dispatch)
              TAG="${INPUT_TAG}"
              ;;
          esac
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: ${TAG}"

      # ── Validate tag format: @oaslananka/a2a-warp-v<semver> ──
      - name: Validate tag format and extract version
        id: version
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ -z "${TAG}" ]]; then
            echo "❌ No tag resolved from event ${EVENT_NAME}"
            exit 1
          fi
          if [[ ! "${TAG}" =~ ^@oaslananka/a2a-warp-v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "❌ Tag '${TAG}' does not match expected format: @oaslananka/a2a-warp-v<semver>"
            echo "   Example: @oaslananka/a2a-warp-v1.25.0"
            exit 1
          fi
          VERSION="${BASH_REMATCH[1]}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "✅ Tag validated: ${TAG} → version ${VERSION}"

      # ── Checkout the exact tag ──
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ steps.tag.outputs.tag }}
          fetch-depth: 0
          persist-credentials: false

      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      # ── Build and test ──
      - run: pnpm run lint:identity
      - run: pnpm run typecheck
      - run: pnpm run test
      - run: pnpm run build
      - run: pnpm run pack:dry-run

      - name: Generate release artifacts
        run: pnpm run release:artifacts

      # ── Preflight: package versions match release tag ──
      - name: 'Preflight: validate package versions match tag'
        run: |
          EXPECTED='${{ steps.version.outputs.version }}'
          for pkg_file in .artifacts/npm/*.tgz; do
            pkg_version="$(tar -xOzf "$pkg_file" package/package.json | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync(0,'utf8')).version)")"
            if [ "$pkg_version" != "$EXPECTED" ]; then
              echo "❌ Package $pkg_file version ${pkg_version} != expected ${EXPECTED}"
              exit 1
            fi
          done
          echo "✅ All package versions match ${EXPECTED}"

      # ── Preflight: check npm registry for existing versions ──
      - name: 'Preflight: check npm registry'
        run: |
          npm_cli=(npx --yes "npm@${NPM_VERSION}")
          any_missing=false
          for pkg_file in ./.artifacts/npm/*.tgz; do
            pkg_json="$(tar -xOzf "$pkg_file" package/package.json)"
            pkg_name="$(node -e "const p=JSON.parse(require('fs').readFileSync(0,'utf8'));process.stdout.write(p.name);" <<< "$pkg_json")"
            pkg_version="$(node -e "const p=JSON.parse(require('fs').readFileSync(0,'utf8'));process.stdout.write(p.version);" <<< "$pkg_json")"
            if "${npm_cli[@]}" view "${pkg_name}@${pkg_version}" version --silent >/dev/null 2>&1; then
              echo "⚠  ${pkg_name}@${pkg_version} already exists on npm — will skip"
            else
              echo "✅ ${pkg_name}@${pkg_version} not found on npm — ready to publish"
              any_missing=true
            fi
          done
          if ! $any_missing; then
            echo "❌ All versions already exist on npm — nothing to publish"
            exit 1
          fi

      - name: Smoke install tarballs
        run: |
          tmp="$(mktemp -d)"
          pushd "$tmp"
          npm init -y
          npm install -- "${GITHUB_WORKSPACE}"/.artifacts/npm/*.tgz
          node -e "console.log('smoke install ok')"
          popd

      - name: Validate release artifacts
        run: pnpm run release:validate

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            .artifacts/npm/*.tgz
            .artifacts/npm/SHA256SUMS
            .artifacts/sbom/a2a-warp.cdx.json

      # ── Publish with npm token auth ──
      - name: Publish packages to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # npm 11+ auto-detects OIDC tokens in GH Actions and uses them for
          # auth/provenance, overriding NODE_AUTH_TOKEN. Explicitly write the
          # .npmrc (to the userconfig path that setup-node configured) and
          # pass --no-provenance so token-based auth is used.
          npmrc_path="${NPM_CONFIG_USERCONFIG:-${HOME}/.npmrc}"
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > "${npmrc_path}"

          npm_cli=(npx --yes "npm@${NPM_VERSION}")
          "${npm_cli[@]}" --version

          for package_file in ./.artifacts/npm/*.tgz; do
            pkg_json="$(tar -xOzf "$package_file" package/package.json)"
            pkg_name="$(node -e "const p=JSON.parse(require('fs').readFileSync(0,'utf8'));process.stdout.write(p.name);" <<< "$pkg_json")"
            pkg_version="$(node -e "const p=JSON.parse(require('fs').readFileSync(0,'utf8'));process.stdout.write(p.version);" <<< "$pkg_json")"

            # Skip if version already published
            if "${npm_cli[@]}" view "${pkg_name}@${pkg_version}" version --silent >/dev/null 2>&1; then
              echo "⏭  Skipping ${pkg_name}@${pkg_version} (already exists on npm)"
              continue
            fi

            # Publish with token-based auth (no-provenance prevents OIDC override)
            if "${npm_cli[@]}" publish "$package_file" --access public --no-provenance; then
              echo "✅ Published ${pkg_name}@${pkg_version}"
            else
              echo "❌ Failed to publish ${pkg_name}@${pkg_version}"
              exit 1
            fi
          done

      # ── Verify ──
      - name: Verify npm provenance
        run: |
          npm_cli=(npx --yes "npm@${NPM_VERSION}")
          # If packages were published with --no-provenance (token auth),
          # there is no provenance to audit. Check and skip gracefully.
          if ! "${npm_cli[@]}" audit signatures --silent 2>/dev/null; then
            echo "⏭  Skipping provenance verification (published with --no-provenance)"
            exit 0
          fi
          verify_dir="$(mktemp -d)"
          pushd "$verify_dir"
          npm init -y
          for package_file in "${GITHUB_WORKSPACE}"/.artifacts/npm/*.tgz; do
            pkg_json="$(tar -xOzf "$package_file" package/package.json)"
            pkg_name="$(node -e "const p=JSON.parse(require('fs').readFileSync(0,'utf8'));process.stdout.write(p.name);" <<< "$pkg_json")"
            pkg_version="$(node -e "const p=JSON.parse(require('fs').readFileSync(0,'utf8'));process.stdout.write(p.version);" <<< "$pkg_json")"
            "${npm_cli[@]}" install "${pkg_name}@${pkg_version}"
          done
          "${npm_cli[@]}" audit signatures
          popd

      - name: Verify package registry parity
        run: pnpm run release:parity
