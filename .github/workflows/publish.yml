name: Publish

'on':
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to publish (default: main)'
        required: false
        default: main
      confirm_publish:
        description: Type A2A-WARP-PUBLISH to publish
        required: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  NODE_VERSION: '24.16.0'
  NPM_VERSION: '11.15.0'

jobs:
  publish:
    name: Publish / npm
    if: |
      ${{
        github.repository == 'oaslananka/a2a-warp' &&
        (
          github.event_name == 'push' ||
          inputs.confirm_publish == 'A2A-WARP-PUBLISH'
        )
      }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: npm-publish
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event_name == 'push' && github.ref || inputs.ref }}
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
      - run: pnpm run lint:identity
      - run: pnpm run typecheck
      - run: pnpm run test
      - run: pnpm run build
      - run: pnpm run pack:dry-run
      - name: Generate release artifacts
        run: pnpm run release:artifacts
      - name: Smoke install tarballs
        run: |
          tmp="$(mktemp -d)"
          pushd "$tmp"
          npm init -y
          npm install -- "${GITHUB_WORKSPACE}"/.artifacts/npm/*.tgz
          node -e "console.log('smoke install ok')"
          popd
      - name: Validate release artifacts
        run: pnpm run release:validate
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            .artifacts/npm/*.tgz
            .artifacts/npm/SHA256SUMS
            .artifacts/sbom/a2a-warp.cdx.json
      - name: Publish packages with provenance
        run: |
          npm_cli=(npx --yes "npm@${NPM_VERSION}")
          "${npm_cli[@]}" --version

          unset NODE_AUTH_TOKEN

          if [[ -n "${NPM_CONFIG_USERCONFIG:-}" ]]; then
            "${npm_cli[@]}" config delete //registry.npmjs.org/:_authToken --userconfig "$NPM_CONFIG_USERCONFIG" || true
          fi

          for package_file in ./.artifacts/npm/*.tgz; do
            package_json="$(tar -xOzf "$package_file" package/package.json)"
            package_name="$(node -e "const fs = require('node:fs'); const pkg = JSON.parse(fs.readFileSync(0, 'utf8')); process.stdout.write(pkg.name);" <<< "$package_json")"
            package_version="$(node -e "const fs = require('node:fs'); const pkg = JSON.parse(fs.readFileSync(0, 'utf8')); process.stdout.write(pkg.version);" <<< "$package_json")"

            if "${npm_cli[@]}" view "${package_name}@${package_version}" version --silent > /dev/null 2>&1; then
              echo "Skipping ${package_name}@${package_version}; version already exists on npm."
              continue
            fi

            "${npm_cli[@]}" publish "$package_file" --access public
          done
      - name: Verify npm provenance
        run: |
          npm_cli=(npx --yes "npm@${NPM_VERSION}")
          verify_dir="$(mktemp -d)"
          pushd "$verify_dir"
          npm init -y
          for package_file in "${GITHUB_WORKSPACE}"/.artifacts/npm/*.tgz; do
            package_json="$(tar -xOzf "$package_file" package/package.json)"
            package_name="$(node -e "const fs = require('node:fs'); const pkg = JSON.parse(fs.readFileSync(0, 'utf8')); process.stdout.write(pkg.name);" <<< "$package_json")"
            package_version="$(node -e "const fs = require('node:fs'); const pkg = JSON.parse(fs.readFileSync(0, 'utf8')); process.stdout.write(pkg.version);" <<< "$package_json")"
            "${npm_cli[@]}" install "${package_name}@${package_version}"
          done
          "${npm_cli[@]}" audit signatures
          popd
      - name: Verify package registry parity
        run: pnpm run release:parity
