name: Bug Report
description: Found something broken? Let us know.
labels: ['bug', 'triage']
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - '@oaslananka/a2a-warp'
        - '@oaslananka/a2a-warp-adapter-anthropic'
        - '@oaslananka/a2a-warp-adapter-base'
        - '@oaslananka/a2a-warp-adapter-crewai'
        - '@oaslananka/a2a-warp-adapter-google-adk'
        - '@oaslananka/a2a-warp-adapter-langchain'
        - '@oaslananka/a2a-warp-adapter-llamaindex'
        - '@oaslananka/a2a-warp-adapter-openai'
        - '@oaslananka/a2a-warp-adapters'
        - '@oaslananka/a2a-warp-bridge-mcp'
        - '@oaslananka/a2a-warp-cli'
        - '@oaslananka/a2a-warp-core'
        - '@oaslananka/a2a-warp-registry'
        - '@oaslananka/a2a-warp-schemas'
        - '@oaslananka/a2a-warp-transport-grpc'
        - '@oaslananka/a2a-warp-transport-ws'
        - 'create-a2a-warp'
        - 'Other'
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package Version
      placeholder: 'e.g. 1.0.2'
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: A minimal TypeScript snippet or repo link
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: dropdown
    id: node-version
    attributes:
      label: Node.js version
      options: ['22', '24', 'Other']
