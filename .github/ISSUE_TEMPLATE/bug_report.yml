name: Bug Report
description: Found something broken? Let us know.
labels: ['bug', 'triage']
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - '@oaslananka/a2a-warp'
        - '@oaslananka/a2a-warp-client'
        - '@oaslananka/a2a-warp-adapters'
        - '@oaslananka/a2a-warp-registry'
        - '@oaslananka/a2a-warp-cli'
        - '@oaslananka/a2a-warp-mcp-bridge'
        - '@oaslananka/a2a-warp-ws'
        - '@oaslananka/a2a-warp-grpc'
        - '@oaslananka/a2a-warp-testing'
        - '@oaslananka/a2a-warp-codex-bridge'
        - 'create-a2a-warp'
        - 'Other'
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package Version
      placeholder: 'e.g. 1.0.2'
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: A minimal TypeScript snippet or repo link
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: dropdown
    id: node-version
    attributes:
      label: Node.js version
      options: ['22', '24', 'Other']
